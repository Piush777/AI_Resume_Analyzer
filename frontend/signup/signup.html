<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>

    <link rel="stylesheet" href="../global/global.css">
    <link rel="stylesheet" href="./signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="./signup.js" defer></script>

</head>

<body>
    <main id="auth-container">

        <div class="auth-left">
            <h1>AI Resume Analyzer</h1>

            <p>Analyze resumes, improve ATS score,
                and discover better job opportunities.</p>
        </div>

        <div class="auth-right">
            <div class="auth-header">

                <h2>Create Account</h2>

                <p>
                    Start your journey toward better resumes and career opportunities.
                </p>

            </div>
            
            <div class="form-container">

                <form class="signup-form">

                    <div class="field">
                        <label for="user-name">

                            Full Name

                        </label>

                        <div class="input-wrapper">

                            <i class="fa-regular fa-user"></i>

                            <input type="text" name="full-name" id="user-name" placeholder="Enter your full name">

                        </div>

                    </div>

                    <div class="field">

                        <label for="user-email">

                            Email

                        </label>

                        <div class="input-wrapper">

                            <i class="fa-regular fa-envelope"></i>

                            <input type="email" id="user-email" name="email" placeholder="Enter your email">

                        </div>

                    </div>

                    <div class="field">

                        <label for="user-password">

                            Password

                        </label>

                        <div class="input-wrapper">

                            <i class="fa-solid fa-lock"></i>

                            <input type="password" id="user-password" name="password" placeholder="Enter your password"
                                class="user-input">

                            <i class="fa-regular fa-eye eye-icon"></i>

                        </div>

                    </div>

                    <div class="field">

                        <label for="confirm-password">

                            Confirm Password

                        </label>

                        <div class="input-wrapper">

                            <i class="fa-solid fa-lock"></i>

                            <input type="password" id="confirm-password" name="confirm-password"
                                placeholder="Confirm Password" class="user-input">

                            <i class="fa-regular fa-eye eye-icon"></i>

                        </div>
                    </div>

                    <button type="submit" class="signup-btn">Sign Up</button>

                </form>

                <div class="divider">

                    <div class="line"></div>

                    <span>or continue with</span>

                    <div class="line"></div>

                </div>

                <button class="google-btn">

                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo">

                    Continue with Google

                </button>

                <p class="signup-text">

                    Already have an account?

                    <a href="../login/login.html">

                        Login

                    </a>

                </p>
            </div>
        </div>

    </main>
</body>

</html>
